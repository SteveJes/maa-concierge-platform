id: maa-restaurant-menu-fr-001
tenant: maa
language: fr-CA
persona: "Visiteur curieux du restaurant Le 1881"
category: restaurant_menu
phase: 3

message: "Vous avez un menu pour le restaurant ?"

expected_facts:
  - "Mentions Restaurant Le 1881 by name"
  - "Offers at least one menu link (main, déjeuner, or wine)"
  - "Mentions the restaurant phone OR the online reservation link"

forbidden:
  - "le menu n'est pas en ligne"
  - "selon le PDF"

forbidden_patterns:
  - /\bmenu\s+n'est\s+pas\s+publi[ée]/i

followup_mode_forbidden: [callback]

judge_rubric:
  question: "Does the assistant give one or more menu links plus a reservation path (phone or online), with a warm one-line invitation?"
  expected: yes

pass_threshold: 0.85
